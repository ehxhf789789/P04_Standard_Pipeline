version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: bim-pipeline-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-bim_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-bim_pipeline}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bim_user} -d ${DB_NAME:-bim_pipeline}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bim-network

  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: bim-pipeline-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bim-network

  # MinIO Object Storage (S3-compatible)
  minio:
    image: minio/minio
    container_name: bim-pipeline-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - bim-network

  # FastAPI Backend
  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile.prod
    container_name: bim-pipeline-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-bim_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-bim_pipeline}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-["https://your-domain.com"]}
      - DEBUG=false
    volumes:
      - pipeline_data:/app/data
      - pipeline_outputs:/app/outputs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - bim-network

  # Celery Worker
  celery-worker:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile.prod
    container_name: bim-pipeline-celery
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-bim_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-bim_pipeline}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - pipeline_data:/app/data
      - pipeline_outputs:/app/outputs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A src.workers.celery_app worker --loglevel=info --concurrency=4
    networks:
      - bim-network

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile.prod
    container_name: bim-pipeline-celery-beat
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-bim_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-bim_pipeline}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - redis
    command: celery -A src.workers.celery_app beat --loglevel=info
    networks:
      - bim-network

  # Next.js Frontend
  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile.prod
      args:
        - NEXT_PUBLIC_API_URL=${API_URL}
        - NEXT_PUBLIC_WS_URL=${WS_URL}
    container_name: bim-pipeline-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - bim-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: bim-pipeline-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - bim-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  pipeline_data:
  pipeline_outputs:

networks:
  bim-network:
    driver: bridge
